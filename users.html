<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Użytkownicy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Panel użytkowników</h1>

<h2>Dodaj użytkownika</h2>

<input type="text" id="loginUser" placeholder="Login">
<input type="password" id="hasloUser" placeholder="Hasło">

<select id="rolaUser">
    <option>Użytkownik</option>
    <option>Admin</option>
</select>

<button onclick="dodajUsera()">
Dodaj użytkownika
</button>

<h2>Lista użytkowników</h2>

<div id="listaUserow"></div>

</div>

<script src="script.js"></script>

</body>
</html>

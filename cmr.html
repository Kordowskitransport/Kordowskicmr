<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nowy CMR</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Dokument CMR</h1>

<h2>Nadawca</h2>

<input type="text" placeholder="Nazwa firmy">
<input type="text" placeholder="Adres">
<input type="text" placeholder="Miasto">
<input type="text" placeholder="Kraj">

<h2>Odbiorca</h2>

<input type="text" placeholder="Nazwa firmy">
<input type="text" placeholder="Adres">
<input type="text" placeholder="Miasto">
<input type="text" placeholder="Kraj">

<h2>Przewoźnik</h2>

<input type="text" placeholder="Nazwa firmy transportowej">
<input type="text" placeholder="NIP">

<h2>Kierowca</h2>

<input type="text" placeholder="Imię i nazwisko">
<input type="text" placeholder="Numer pojazdu">
<input type="text" placeholder="Numer naczepy">

<h2>Załadunek</h2>

<input type="date">
<input type="text" placeholder="Miejsce załadunku">

<h2>Rozładunek</h2>

<input type="date">
<input type="text" placeholder="Miejsce rozładunku">

<h2>Towar</h2>

<input type="text" placeholder="Nazwa towaru">
<input type="number" placeholder="Ilość palet">
<input type="number" placeholder="Waga brutto (kg)">

<textarea placeholder="Uwagi"></textarea>

<button>Zapisz dokument CMR</button>

</div>

</body>
</html>
<h2 id="numerCMR"></h2>
